# Site settings
title: 알콩달콩 똑순이 라이프
email:
description: >-
  30대 중반 똑순이의 알뜰살림과 집밥 일상.
locale: "ko-KR"
url: "https://duckiechan-lang.github.io"
baseurl: "/notes"
twitter_username:
github_username: duckiechan-lang
# 홈/목록 등 대표 이미지가 없는 페이지의 기본 og:image (개별 글은 header.image가 우선)
og_image: "/assets/images/2026-03-20-spring-meal.jpg"
og_image_alt: "알콩달콩 똑순이 라이프 — 집밥과 알뜰살림 기록"
minimal_mistakes_skin: "sunrise"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "똑순이"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "알뜰하게 살림하고 평일 저녁 집밥 챙기는 이야기. 가끔 제품리뷰"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/duckiechan-lang"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/duckiechan-lang"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      comments: false
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
